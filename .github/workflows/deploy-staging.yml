# ──────────────────────────────────────────────────────────────────────────────
# Deploy to Staging — Triggered on release branches
# Deploys to staging K3s cluster, runs smoke tests + backtest regression.
# ──────────────────────────────────────────────────────────────────────────────
name: Deploy to Staging

on:
  push:
    branches: ["release/**"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy"
        required: true
        default: "main"

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/polytrade

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Deploy to staging via kubectl
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_SERVER_HOST }}
          username: ${{ secrets.STAGING_SERVER_USER }}
          key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "📦 Deploying to staging — SHA: ${{ steps.tags.outputs.sha }}"

            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            export IMAGE_TAG="${{ steps.tags.outputs.sha }}"

            # Update K8s manifests with new image tag
            cd /opt/polytrade/infra/k8s

            # Apply with kustomize
            kubectl kustomize . | \
              sed "s/:latest/:${IMAGE_TAG}/g" | \
              kubectl apply -f -

            # Wait for rollout
            kubectl rollout status deployment/api-gateway    -n polytrade --timeout=120s
            kubectl rollout status deployment/data-collector -n polytrade --timeout=120s
            kubectl rollout status deployment/strategy-engine -n polytrade --timeout=120s

            echo "✅ Staging deployment complete"

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          echo "🔍 Running smoke tests..."
          STAGING_URL="http://${{ secrets.STAGING_SERVER_HOST }}"

          # Test API health
          curl -sf "${STAGING_URL}:3000/health" || (echo "❌ API health failed" && exit 1)
          echo "✅ API health OK"

          # Test WebSocket connectivity
          curl -sf "${STAGING_URL}:3000/ws/health" || echo "⚠️  WebSocket health not available yet"

          echo "✅ Smoke tests passed"

  backtest-regression:
    name: Backtest Regression
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: workers
        run: uv sync --frozen

      - name: Run backtest regression suite
        working-directory: workers
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          echo "📊 Running backtest regression..."
          uv run pytest tests/backtest/regression/ \
            --tb=short \
            -q \
            --junitxml=backtest-results.xml

      - name: Upload backtest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-regression
          path: workers/backtest-results.xml
          retention-days: 30

      - name: Post results summary
        if: always()
        run: |
          echo "## 📊 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backtest Regression | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
